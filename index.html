<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>森林時光</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b4332">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="森林時光">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Lora:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#edf7f0;--surface:#fff;--surface2:rgba(255,255,255,.72);
  --green-deep:#1b4332;--green-mid:#2d6a4f;--green-light:#52b788;--green-pale:#b7e4c7;
  --red:#c1440e;
  --shadow-sm:0 2px 10px rgba(27,67,50,.08);--shadow-md:0 4px 20px rgba(27,67,50,.13);
  --radius-sm:12px;--radius-md:18px;--radius-pill:40px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Serif TC',serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;color:var(--green-deep);}

/* ── AUTH ── */
#authScreen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.auth-box{width:100%;max-width:360px;background:var(--surface);border-radius:var(--radius-md);padding:28px 24px;box-shadow:var(--shadow-md);}
.auth-logo{font-size:2.5rem;text-align:center;margin-bottom:6px;}
.auth-title{font-size:1.1rem;font-weight:600;color:var(--green-deep);text-align:center;margin-bottom:4px;}
.auth-sub{font-size:.76rem;color:var(--green-mid);text-align:center;margin-bottom:24px;}
.auth-input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--green-pale);font-family:'Noto Serif TC',serif;font-size:.88rem;color:var(--green-deep);outline:none;margin-bottom:10px;background:#fff;box-sizing:border-box;}
.auth-input:focus{border-color:var(--green-mid);}
.auth-btn{width:100%;padding:11px;border:none;border-radius:var(--radius-pill);background:var(--green-deep);color:#fff;font-family:'Noto Serif TC',serif;font-size:.9rem;cursor:pointer;margin-bottom:8px;transition:background .2s;}
.auth-btn:hover{background:var(--green-mid);}
.auth-toggle{font-size:.76rem;color:var(--green-mid);text-align:center;cursor:pointer;text-decoration:underline;}
.auth-msg{font-size:.74rem;text-align:center;margin-top:8px;min-height:18px;color:var(--red);}
.auth-msg.ok{color:var(--green-mid);}

/* ── NAV ── */
.logout-btn{padding:4px 10px;border-radius:var(--radius-pill);border:1.5px solid var(--green-pale);background:transparent;font-family:'Noto Serif TC',serif;font-size:.68rem;color:var(--green-mid);cursor:pointer;}
nav{width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;position:sticky;top:0;z-index:50;background:rgba(237,247,240,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(183,228,199,.4);}
.logo{font-size:1.1rem;font-weight:600;letter-spacing:.04em;color:var(--green-deep);}
.nav-tabs{display:flex;gap:3px;background:rgba(255,255,255,.65);border-radius:var(--radius-pill);padding:3px;}
.nav-tab{padding:6px 16px;border-radius:var(--radius-pill);border:none;background:transparent;font-family:'Noto Serif TC',serif;font-size:.76rem;color:var(--green-mid);cursor:pointer;transition:all .22s;white-space:nowrap;}
.nav-tab.active{background:var(--green-deep);color:#fff;box-shadow:0 2px 8px rgba(27,67,50,.2);}

/* ── SCREENS ── */
.screen{display:none;width:100%;max-width:480px;flex:1;flex-direction:column;align-items:center;padding:16px 16px 80px;}
.screen.active{display:flex;}

/* ── TIMER ── */
.mode-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;}
.mode-btn{padding:5px 16px;border-radius:var(--radius-pill);border:1.5px solid var(--green-pale);background:var(--surface2);font-family:'Lora',serif;font-size:.95rem;color:var(--green-mid);cursor:pointer;transition:all .2s;}
.mode-btn.active{background:var(--green-mid);color:#fff;border-color:var(--green-mid);}
.mode-btn:hover:not(.active){border-color:var(--green-light);background:#fff;}

/* ── CUSTOM TIME MODAL ── */
.custom-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:400;display:flex;align-items:center;justify-content:center;}
.custom-modal{background:#fff;border-radius:var(--radius-md);padding:28px 24px 22px;width:88%;max-width:320px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:var(--shadow-md);}
.custom-modal-title{font-size:.78rem;color:var(--green-light);letter-spacing:.08em;text-transform:uppercase;font-weight:400;}
.custom-modal-val{font-family:'Lora',serif;font-size:2.6rem;font-weight:600;color:var(--green-deep);line-height:1;}
.custom-modal-unit{font-size:.76rem;color:var(--green-mid);margin-top:-6px;}
.custom-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:10px;background:var(--green-pale);outline:none;margin:8px 0;}
.custom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--green-deep);cursor:pointer;box-shadow:0 2px 8px rgba(27,67,50,.3);}
.custom-slider::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:var(--green-deep);cursor:pointer;border:none;box-shadow:0 2px 8px rgba(27,67,50,.3);}
.custom-modal-btns{display:flex;gap:10px;width:100%;margin-top:4px;}
.custom-modal-btns button{flex:1;padding:11px;border-radius:var(--radius-pill);font-family:'Noto Serif TC',serif;font-size:.88rem;cursor:pointer;transition:all .2s;}
.custom-cancel{background:transparent;border:1.5px solid var(--green-pale);color:var(--green-mid);}
.custom-confirm{background:var(--green-deep);border:none;color:#fff;box-shadow:0 3px 10px rgba(27,67,50,.2);}
.custom-confirm:hover{background:var(--green-mid);}

.ring-wrap{position:relative;width:260px;height:260px;margin-bottom:8px;flex-shrink:0;}
.ring-svg{width:260px;height:260px;transform:rotate(-90deg);}
.ring-track{fill:none;stroke:rgba(255,255,255,.5);stroke-width:9;}
.ring-fill{fill:none;stroke:var(--green-mid);stroke-width:9;stroke-linecap:round;stroke-dasharray:723;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .5s;}
.ring-fill.dying{stroke:var(--red);}
.ring-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.7);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* Canvas soil sits at bottom of ring-inner */
#soilCanvas{position:absolute;bottom:0;left:0;width:100%;height:100%;border-radius:50%;pointer-events:none;}

.tree-emoji-display{
  position:relative;z-index:1;
  font-size:52px;line-height:1;user-select:none;
  transition:font-size .6s cubic-bezier(.34,1.56,.64,1), filter .5s;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.12));
  margin-bottom:18px; /* keep emoji above soil */
}
@keyframes treePulse{0%,100%{transform:scale(1) rotate(0deg);}30%{transform:scale(1.06) rotate(-1deg);}60%{transform:scale(1.04) rotate(1deg);}}
@keyframes treeGrow{0%{transform:scale(.6);opacity:.5;}100%{transform:scale(1);opacity:1;}}
@keyframes treeBoom{0%{transform:scale(1);}40%{transform:scale(1.35) rotate(-3deg);}70%{transform:scale(.95) rotate(2deg);}100%{transform:scale(1.1);}}
@keyframes treeGlow{0%,100%{filter:drop-shadow(0 0 8px #52b788) drop-shadow(0 0 18px #b7e4c7);}50%{filter:drop-shadow(0 0 14px #52b788) drop-shadow(0 0 28px #b7e4c7);}}
.tree-breathing{animation:treePulse 3.5s ease-in-out infinite;}
.tree-grow-anim{animation:treeGrow .5s cubic-bezier(.34,1.56,.64,1) both;}
.tree-boom{animation:treeBoom .6s cubic-bezier(.34,1.56,.64,1) both;}
.tree-glow{animation:treeGlow 2.5s ease-in-out infinite;}

.timer-below{display:flex;flex-direction:column;align-items:center;margin-top:14px;gap:4px;}
.timer-num{font-family:'Lora',serif;font-size:2.2rem;font-weight:600;color:var(--green-deep);letter-spacing:.02em;line-height:1;}
.status-msg{font-size:.82rem;color:var(--green-mid);text-align:center;min-height:20px;margin-top:10px;margin-bottom:16px;transition:color .4s;}
.status-msg.fail{color:var(--red);}

/* ── PICKER ── */
.picker-scroll-wrap{width:calc(100% + 32px);margin-left:-16px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:4px 16px 10px;cursor:grab;}
.picker-scroll-wrap::-webkit-scrollbar{display:none;}
.picker-scroll-wrap:active{cursor:grabbing;}
.tree-picker{display:grid;grid-template-rows:repeat(2,1fr);grid-auto-flow:column;grid-auto-columns:68px;gap:7px;width:max-content;}
.picker-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 6px 7px;border-radius:14px;border:2px solid transparent;cursor:pointer;background:var(--surface2);transition:all .18s;width:68px;user-select:none;}
.picker-item:hover{border-color:var(--green-pale);background:#fff;}
.picker-item.selected{border-color:var(--green-mid);background:#fff;box-shadow:var(--shadow-sm);}
.picker-item .mini-tree{font-size:28px;line-height:1;}
.picker-item .mini-name{font-size:.58rem;color:var(--green-mid);text-align:center;line-height:1.3;}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px;margin-bottom:4px;}
.btn{padding:13px 32px;border:none;border-radius:var(--radius-pill);font-family:'Noto Serif TC',serif;font-size:.86rem;cursor:pointer;transition:all .22s;}
.btn-primary{background:var(--green-deep);color:#fff;box-shadow:0 3px 12px rgba(27,67,50,.25);}
.btn-primary:hover{background:var(--green-mid);transform:translateY(-1px);}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid rgba(193,68,14,.4);}
.btn-danger:hover{background:var(--red);color:#fff;border-color:var(--red);}

/* ── PARTICLES ── */
@keyframes petalFly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg);}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(.3) rotate(var(--pr));}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-90px) scale(.4);}}
@keyframes fallLeaf{0%{opacity:1;transform:translate(0,0) rotate(0);}100%{opacity:0;transform:translate(var(--dx),55px) rotate(var(--dr));}}
.particle{position:fixed;pointer-events:none;font-size:16px;animation:floatUp 1.8s ease-out forwards;z-index:300;}
.fall-leaf{position:absolute;animation:fallLeaf 1.4s ease-in forwards;}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(178,231,200,.9);backdrop-filter:blur(8px);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
@keyframes pop{from{transform:scale(0) rotate(-10deg);}to{transform:scale(1) rotate(0);}}
.overlay-emoji{font-size:80px;animation:pop .5s cubic-bezier(.175,.885,.32,1.275) both;}
.overlay-title{font-size:1.25rem;font-weight:600;color:var(--green-deep);}
.overlay-sub{font-size:.82rem;color:var(--green-mid);margin-bottom:12px;}

/* ── GARDEN ── */
#gardenScreen{background:#f1f8f2;min-height:100vh;padding:0;max-width:480px;width:100%;}
.garden-topbar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:16px 18px 14px;border-bottom:1px solid rgba(183,228,199,.5);}
.garden-title{font-size:.95rem;font-weight:600;color:var(--green-deep);}
.garden-count{font-size:.72rem;color:var(--green-mid);}
.garden-scroll-wrap{width:100%;overflow-y:auto;padding:14px;}
.garden-grid-topview{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;}
.gtv-cell{aspect-ratio:1;border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;overflow:hidden;transition:transform .14s;}
.gtv-cell.has-tree{background:linear-gradient(145deg,#d4edda,#b7e4c7);box-shadow:var(--shadow-sm);}
.gtv-cell.has-tree:active{transform:scale(.92);}
.gtv-cell.dead-tree{background:linear-gradient(145deg,#ece6df,#d9cec5);}
.gtv-cell.empty-cell{background:rgba(183,228,199,.2);border:1.5px dashed rgba(82,183,136,.25);}
.gtv-emoji{font-size:26px;line-height:1;}
.gtv-label{font-size:.5rem;color:var(--green-deep);text-align:center;line-height:1.4;padding:0 2px;}
.gtv-cell.dead-tree .gtv-label{color:#8a7060;}
.gtv-tip{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:rgba(10,30,18,.88);color:#d8f3dc;font-size:.58rem;white-space:nowrap;padding:4px 8px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:20;font-family:'Noto Serif TC',serif;}
.gtv-cell:hover .gtv-tip{opacity:1;}
.garden-legend{padding:10px 14px 20px;display:flex;gap:12px;flex-wrap:wrap;color:var(--green-mid);font-size:.66rem;}
.garden-legend span{display:flex;align-items:center;gap:3px;}

/* ── STATS ── */
.stats-section{width:100%;background:var(--surface);border-radius:var(--radius-md);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
.stats-section h3{font-size:.72rem;color:var(--green-light);letter-spacing:.08em;margin-bottom:12px;text-transform:uppercase;font-weight:400;}
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-card{background:var(--bg);border-radius:var(--radius-sm);padding:14px;text-align:center;}
.stat-card .s-val{font-family:'Lora',serif;font-size:1.5rem;color:var(--green-deep);line-height:1;}
.stat-card .s-lbl{font-size:.64rem;color:var(--green-mid);margin-top:4px;}
.chart-wrap{width:100%;overflow-x:auto;}
.chart{display:flex;align-items:flex-end;gap:5px;height:80px;padding-bottom:2px;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:26px;}
.bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(to top,var(--green-mid),var(--green-light));min-height:2px;transition:height .7s ease;}
.bar.today{background:linear-gradient(to top,var(--green-deep),var(--green-mid));}
.bar-day{font-size:.54rem;color:var(--green-mid);}
.bar-min{font-size:.54rem;color:var(--green-deep);font-family:'Lora',serif;}
.fav-tree-cards{display:flex;flex-direction:column;gap:10px;}
.fav-card{display:flex;align-items:center;gap:12px;background:var(--bg);border-radius:var(--radius-sm);padding:12px 14px;}
.fav-rank-num{font-size:1rem;width:24px;flex-shrink:0;text-align:center;}
.fav-emoji{font-size:34px;flex-shrink:0;}
.fav-info{flex:1;min-width:0;}
.fav-name{font-size:.88rem;font-weight:600;color:var(--green-deep);margin-bottom:5px;}
.fav-bar-wrap{height:6px;background:rgba(82,183,136,.15);border-radius:10px;}
.fav-bar{height:100%;border-radius:10px;background:linear-gradient(to right,var(--green-mid),var(--green-light));transition:width 1s ease;}
.fav-meta{display:flex;justify-content:space-between;margin-top:5px;}
.fav-cnt{font-size:.66rem;color:var(--green-mid);}
.fav-mins{font-size:.66rem;color:var(--green-light);}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">🌲</div>
    <div class="auth-title">森林時光</div>
    <div class="auth-sub" id="authSubtitle">登入以同步你的森林紀錄</div>
    <input class="auth-input" type="email" id="authEmail" placeholder="電子郵件">
    <input class="auth-input" type="password" id="authPassword" placeholder="密碼（至少6位）">
    <button class="auth-btn" onclick="authSubmit()">登入</button>
    <div class="auth-toggle" onclick="toggleAuthMode()" id="authToggle">還沒有帳號？點此註冊</div>
    <div class="auth-toggle" style="margin-top:6px;color:var(--green-light);" onclick="forgotPassword()">忘記密碼？</div>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<nav>
  <div class="logo">🌲 森林時光</div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="go('timer')">種樹</button>
      <button class="nav-tab" onclick="go('garden')">花園</button>
      <button class="nav-tab" onclick="go('stats')">統計</button>
    </div>
    <button class="logout-btn" onclick="logout()">登出</button>
  </div>
</nav>

<!-- TIMER -->
<div class="screen active" id="timerScreen">
  <div class="mode-row" id="modeRow">
    <button class="mode-btn active" onclick="setMode(25)">25</button>
    <button class="mode-btn" onclick="setMode(30)">30</button>
    <button class="mode-btn" onclick="setMode(35)">35</button>
    <button class="mode-btn" onclick="setMode(40)">40</button>
    <button class="mode-btn" id="customModeBtn" onclick="openCustomModal()">自訂</button>
  </div>
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 270 270">
      <circle class="ring-track" cx="135" cy="135" r="115"/>
      <circle class="ring-fill" id="ringFill" cx="135" cy="135" r="115"/>
    </svg>
    <div class="ring-inner">
      <canvas id="soilCanvas" width="180" height="180"></canvas>
      <div class="tree-emoji-display" id="treeEmojiDisplay"></div>
    </div>
  </div>
  <div class="timer-below">
    <div class="timer-num" id="timerNum">25:00</div>
  </div>
  <div class="btn-row" id="btnRow">
    <button class="btn btn-primary" onclick="startFocus()">🌱 開始種植</button>
  </div>
  <div class="status-msg" id="statusMsg">選好樹種，種下你的專注</div>
  <div class="picker-scroll-wrap" id="pickerScrollWrap">
    <div class="tree-picker" id="treePicker"></div>
  </div>
</div>

<!-- GARDEN -->
<div class="screen" id="gardenScreen">
  <div class="garden-topbar">
    <div class="garden-title">🌲 我的森林</div>
    <div class="garden-count" id="gardenCount">0 棵樹</div>
  </div>
  <div class="garden-scroll-wrap">
    <div class="garden-grid-topview" id="gardenGridTV"></div>
  </div>
  <div class="garden-legend">
    <span>🌱 空地</span><span>🌳 成功種植</span><span>🥀 放棄枯死</span>
  </div>
</div>

<!-- STATS -->
<div class="screen" id="statsScreen">
  <div class="stats-section">
    <h3>累積總覽</h3>
    <div class="stat-cards">
      <div class="stat-card"><div class="s-val" id="sTotalMin">0</div><div class="s-lbl">總分鐘</div></div>
      <div class="stat-card"><div class="s-val" id="sTotalTree">0</div><div class="s-lbl">種成功</div></div>
      <div class="stat-card"><div class="s-val" id="sToday">0</div><div class="s-lbl">今日分鐘</div></div>
      <div class="stat-card"><div class="s-val" id="sStreak">0</div><div class="s-lbl">連續天數</div></div>
    </div>
  </div>
  <div class="stats-section">
    <h3>近 7 天專注（分鐘）</h3>
    <div class="chart-wrap"><div class="chart" id="chart"></div></div>
  </div>
  <div class="stats-section">
    <h3>最愛的樹</h3>
    <div class="fav-tree-cards" id="rankList"></div>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" style="display:none">
  <div class="overlay-emoji" id="overlayEmoji">🌸</div>
  <div class="overlay-title">專注完成！</div>
  <div class="overlay-sub" id="overlaySub">樹已種進森林</div>
  <button class="btn btn-primary" onclick="dismissOverlay()">繼續種樹 🌲</button>
</div>

<script>
// ─────────────────────────────────────────
// SOIL CANVAS
// ─────────────────────────────────────────
const soilCv  = document.getElementById('soilCanvas');
const soilCtx = soilCv.getContext('2d');

function drawSoil() {
  const w = soilCv.width, h = soilCv.height;
  soilCtx.clearRect(0, 0, w, h);
  soilCtx.save();
  soilCtx.beginPath(); soilCtx.ellipse(w/2, h-8, 68, 14, 0, 0, Math.PI*2);
  soilCtx.fillStyle='#7a5c40'; soilCtx.globalAlpha=.92; soilCtx.fill();
  soilCtx.beginPath(); soilCtx.ellipse(w/2, h-14, 56, 10, 0, 0, Math.PI*2);
  soilCtx.fillStyle='#a0785a'; soilCtx.globalAlpha=.88; soilCtx.fill();
  soilCtx.restore();
}
drawSoil();

// ─────────────────────────────────────────
// TREE DEFINITIONS
// ─────────────────────────────────────────
// emojis: [stage0(土地), stage1(發芽), stage2(小), stage3(中), stage4(完成)]
// stage0 = empty, soil canvas handles it
const TREES = [
  { id:'oak',      emoji:'🌳', name:'橡樹',   emojis:['','🌱','🪴','🌳','🌳'], glow:'#52b788' },

let authMode = 'login';

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  document.getElementById('authToggle').textContent = authMode === 'login' ? '還沒有帳號？點此註冊' : '已有帳號？點此登入';
  document.querySelector('.auth-btn').textContent = authMode === 'login' ? '登入' : '註冊';

async function forgotPassword() {
  const email = document.getElementById('authEmail').value.trim();
  const msg = document.getElementById('authMsg');
  if (!email) { msg.className='auth-msg'; msg.textContent='請先填寫你的 Email'; return; }
  msg.className='auth-msg ok'; msg.textContent='寄送中...';
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if (error) { msg.className='auth-msg'; msg.textContent='寄送失敗：'+error.message; }
  else { msg.className='auth-msg ok'; msg.textContent='✅ 重設密碼信已寄出，請查收信箱'; }
}

async function authSubmit() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const msg = document.getElementById('authMsg');
  msg.textContent='處理中...'; msg.className='auth-msg ok';
  if (!email||!password) { msg.className='auth-msg'; msg.textContent='請填寫Email和密碼'; return; }
  if (authMode==='login') {
    const {error} = await sb.auth.signInWithPassword({email,password});
    if (error) { msg.className='auth-msg'; msg.textContent='登入失敗：'+(error.message.includes('Invalid')?'帳號或密碼錯誤':error.message); }
  } else {
    const {error} = await sb.auth.signUp({email,password});
    if (error) { msg.className='auth-msg'; msg.textContent='註冊失敗：'+error.message; }
    else { msg.className='auth-msg ok'; msg.textContent='✅ 註冊成功！請查收確認信再登入'; authMode='login'; }
  }
}

// ─────────────────────────────────────────
// NAV
// ─────────────────────────────────────────
function go(tab) {
  document.querySelectorAll('.nav-tab').forEach(t=>{
    t.classList.toggle('active', t.textContent.trim().startsWith(tab==='timer'?'種':tab==='garden'?'花':'統'));
  });
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(tab+'Screen').classList.add('active');
  if(tab==='garden') renderGarden();
  if(tab==='stats')  renderStats();
}

// ─────────────────────────────────────────
// PICKER
// ─────────────────────────────────────────
function buildPicker() {
  const wrap = document.getElementById('treePicker');
  wrap.innerHTML = '';
  TREES.forEach(t => {
    const d = document.createElement('div');
    d.className = 'picker-item'+(t.id===selTree.id?' selected':'');
    d.innerHTML = `<div class="mini-tree">${t.emoji}</div><div class="mini-name">${t.name}</div>`;
    d.onclick = () => {
      selTree = t;
      document.querySelectorAll('.picker-item').forEach(x=>x.classList.remove('selected'));
      d.classList.add('selected');
      setStageDisplay(0, false);
    };
    wrap.appendChild(d);
  });
}

// ─────────────────────────────────────────
// EMOJI STAGE DISPLAY
// ─────────────────────────────────────────
function setStageDisplay(stageIdx, animate=true) {
  currentStageIdx = stageIdx;
  const el = document.getElementById('treeEmojiDisplay');
  if (!el) return;
  const emoji = selTree.emojis[stageIdx] || '';
  const gc = selTree.glow || '#52b788';
  const gcFade = gc + '88';
  el.classList.remove('tree-grow-anim','tree-boom','tree-breathing','tree-glow');
  el.style.filter = '';
  el.style.fontSize = STAGE_FS[stageIdx];
  if (emoji !== el.textContent) {
    el.textContent = emoji;
    void el.offsetWidth;
    if (animate && stageIdx > 0) el.classList.add('tree-grow-anim');
  }
  if (stageIdx === 3) {
    el.style.filter = `drop-shadow(0 0 10px ${gc}) drop-shadow(0 0 20px ${gcFade})`;
  }
  if (stageIdx === 4) {
    // inject dynamic keyframes for this tree's glow color
    let styleTag = document.getElementById('dynamicGlow');
    if (!styleTag) { styleTag = document.createElement('style'); styleTag.id='dynamicGlow'; document.head.appendChild(styleTag); }
    styleTag.textContent = `@keyframes treeGlow{0%,100%{filter:drop-shadow(0 0 8px ${gc}) drop-shadow(0 0 18px ${gcFade});}50%{filter:drop-shadow(0 0 16px ${gc}) drop-shadow(0 0 32px ${gcFade});}}`;
    el.classList.add('tree-glow');
  }
}

function setDeadDisplay() {
  const el = document.getElementById('treeEmojiDisplay');
  if (!el) return;
  el.classList.remove('tree-grow-anim','tree-boom','tree-breathing','tree-glow');
  el.textContent = '🥀';
  el.style.fontSize = '64px';
  el.style.filter = 'grayscale(.5) drop-shadow(0 4px 8px rgba(0,0,0,.2))';
}

function setMode(m) {
  if(isRunning) return;
  curMode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('onclick')===`setMode(${m})`);
  });
  showTime(curMode*60);
}

let customMinutes = 25;

function openCustomModal() {
  if(isRunning) return;
  const backdrop = document.createElement('div');
  backdrop.className = 'custom-modal-backdrop';
  backdrop.id = 'customModalBackdrop';
  backdrop.innerHTML = `
    <div class="custom-modal">
      <div class="custom-modal-title">自訂時間</div>
      <div class="custom-modal-val" id="customValDisplay">${customMinutes}</div>
      <div class="custom-modal-unit">分鐘</div>
      <input class="custom-slider" type="range" min="5" max="90" value="${customMinutes}" id="customSlider"
        oninput="document.getElementById('customValDisplay').textContent=this.value">
      <div class="custom-modal-btns">
        <button class="custom-cancel" onclick="closeCustomModal()">取消</button>
        <button class="custom-confirm" onclick="confirmCustomTime()">確認</button>
      </div>
    </div>`;
  document.body.appendChild(backdrop);
  backdrop.addEventListener('click', e=>{ if(e.target===backdrop) closeCustomModal(); });
}

function closeCustomModal() {
  const el = document.getElementById('customModalBackdrop');
  if(el) el.remove();
}

function confirmCustomTime() {
  const val = parseInt(document.getElementById('customSlider').value);
  customMinutes = val;
  closeCustomModal();
  curMode = val;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('customModeBtn');
  btn.classList.add('active');
  btn.textContent = val;
  showTime(val*60);
}

function showTime(s) {
  s = Math.round(s);
  const m=Math.floor(s/60), sec=s%60;
  document.getElementById('timerNum').textContent = `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ─────────────────────────────────────────
// FOCUS
// ─────────────────────────────────────────
function startFocus() {
  totalTime=curMode*60; timeLeft=totalTime;
  startTimestamp=Date.now(); isRunning=true;

  setStageDisplay(0, false);
  const el = document.getElementById('treeEmojiDisplay');
  setRing(0);
  document.getElementById('ringFill').classList.remove('dying');
  document.getElementById('statusMsg').className='status-msg';
  document.getElementById('statusMsg').textContent=`🌱 ${selTree.name}正在生長，加油！`;
  document.getElementById('modeRow').style.display='none';
  document.getElementById('pickerScrollWrap').style.display='none';
  document.getElementById('btnRow').innerHTML=`<button class="btn btn-danger" onclick="giveUp()">放棄（樹枯死）</button>`;

  if(el) el.classList.add('tree-breathing');
  timerId=setInterval(tick,1000);
  requestWakeLock();
}

function tick() {
  const elapsed=Math.floor((Date.now()-startTimestamp)/1000);
  timeLeft=Math.max(totalTime-elapsed,0);
  showTime(timeLeft);
  const prog=elapsed/totalTime;
  setRing(Math.min(prog,1));

  const stageIdx = prog<.25?0 : prog<.50?1 : prog<.75?2 : 3;
  if(stageIdx!==currentStageIdx) setStageDisplay(stageIdx);

  if(Math.random()<.06) spawnParticle(['🍃','🌿','✨','💨'][Math.floor(Math.random()*4)]);
  if(timeLeft<=0) finishFocus();
}

function setRing(ratio) {
  document.getElementById('ringFill').style.strokeDashoffset=CIRC*(1-ratio);
}

function finishFocus() {
  clearInterval(timerId); isRunning=false;
  releaseWakeLock();
  const el=document.getElementById('treeEmojiDisplay');
  if(el) el.classList.remove('tree-breathing');
  setStageDisplay(4);
  if(el) { void el.offsetWidth; el.classList.add('tree-boom'); }

  burstPetals();
  const entry={tree:selTree.id,emoji:selTree.emoji,name:selTree.name,mins:Math.round(totalTime/60),date:todayStr(),dead:false};
  garden.push(entry); save(); saveToSupabase(entry);
  for(let i=0;i<10;i++) setTimeout(()=>spawnParticle(['🌸','🌺','🍀','✨','🌿'][Math.floor(Math.random()*5)]),i*100);

  document.getElementById('overlaySub').textContent=`${entry.mins} 分鐘的 ${entry.name} 已種進森林！`;
  const overlayEmojiEl = document.getElementById('overlayEmoji');
  overlayEmojiEl.textContent = selTree.emojis[4]||selTree.emoji;
  const gc = selTree.glow || '#52b788';
  const gcFade = gc + '88';
  // inject dynamic glow keyframes for this tree's color
  let styleTag = document.getElementById('dynamicGlow');
  if (!styleTag) { styleTag = document.createElement('style'); styleTag.id='dynamicGlow'; document.head.appendChild(styleTag); }
  styleTag.textContent = `@keyframes treeGlow{0%,100%{filter:drop-shadow(0 0 8px ${gc}) drop-shadow(0 0 18px ${gcFade});}50%{filter:drop-shadow(0 0 16px ${gc}) drop-shadow(0 0 32px ${gcFade});}}`;
  overlayEmojiEl.style.filter = '';
  overlayEmojiEl.style.animation = 'pop .5s cubic-bezier(.175,.885,.32,1.275) both, treeGlow 2.5s ease-in-out .5s infinite';
  document.getElementById('overlay').style.display='flex';
}

function dismissOverlay() {
  document.getElementById('overlay').style.display='none';
  resetUI();
}

    <div style="background:#fff;border-radius:20px;padding:28px 24px;max-width:300px;width:88%;text-align:center;font-family:'Noto Serif TC',serif;">
      <div style="font-size:2.2rem;margin-bottom:10px;">🥀</div>

      <div style="font-size:.82rem;color:#2d6a4f;margin-bottom:20px;">樹會枯死喔</div>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button id="giveUpCancel" style="flex:1;padding:10px;border-radius:40px;border:1.5px solid #b7e4c7;background:#fff;font-family:'Noto Serif TC',serif;font-size:.88rem;color:#2d6a4f;cursor:pointer;">繼續專注</button>
        <button id="giveUpConfirm" style="flex:1;padding:10px;border-radius:40px;border:none;background:#c1440e;color:#fff;font-family:'Noto Serif TC',serif;font-size:.88rem;cursor:pointer;">放棄</button>

  document.getElementById('giveUpCancel').onclick=()=>dialog.remove();

    dialog.remove();

    const el=document.getElementById('treeEmojiDisplay');

    const c=document.getElementById('treeEmojiDisplay');
    if(c){['🍂','🍁','🍂'].forEach((l,i)=>{
      const span=document.createElement('span');
      span.className='fall-leaf'; span.textContent=l;
      span.style.cssText=`--dx:${(Math.random()-.5)*50}px;--dr:${(Math.random()-.5)*80}deg;top:10%;left:${20+i*25}%;font-size:14px;position:absolute;`;

    garden.push(entry); save(); saveToSupabase(entry);
    setTimeout(resetUI,1900);
  };
}

function resetUI() {
  isRunning=false; startTimestamp=null;
  setStageDisplay(0, false);
  setRing(0);
  document.getElementById('ringFill').classList.remove('dying');
  document.getElementById('statusMsg').className='status-msg';
  document.getElementById('statusMsg').textContent='選好樹種，種下你的專注';
  document.getElementById('modeRow').style.display='flex';
  document.getElementById('pickerScrollWrap').style.display='block';
  const el=document.getElementById('treeEmojiDisplay');
  if(el){ el.classList.remove('tree-breathing','tree-boom','tree-grow-anim','tree-glow'); el.style.filter=''; }
  document.getElementById('btnRow').innerHTML=`<button class="btn btn-primary" onclick="startFocus()">🌱 開始種植</button>`;
  // restore custom button label
  const customBtn = document.getElementById('customModeBtn');
  if(customBtn) customBtn.textContent = '自訂';
  showTime(curMode*60);
  go('timer');

function renderGarden() {
  const grid=document.getElementById('gardenGridTV');
  const alive=garden.filter(t=>!t.dead);
  document.getElementById('gardenCount').textContent=`${alive.length} 棵 · 共 ${garden.length} 次`;
  grid.innerHTML='';
  const TOTAL=Math.max(Math.ceil((garden.length+5)/5)*5,20);
  for(let i=0;i<TOTAL;i++){
    const cell=document.createElement('div');
    const entry=garden[i];
    if(entry){
      const tDef=TREES.find(x=>x.id===entry.tree);
      const tName=entry.name||(tDef?tDef.name:'未知');
      const tEmoji=entry.dead?'🥀':(entry.emoji||(tDef?tDef.emoji:'🌳'));
      cell.className='gtv-cell '+(entry.dead?'dead-tree':'has-tree');
      cell.innerHTML=`<div class="gtv-tip">${tName}・${entry.date}・${entry.mins}分${entry.dead?' 💀':'✓'}</div><div class="gtv-emoji">${tEmoji}</div><div class="gtv-label">${tName}<br>${entry.mins}分</div>`;
    } else {
      cell.className='gtv-cell empty-cell';
    }
    grid.appendChild(cell);
  }
}

// ─────────────────────────────────────────
// STATS
// ─────────────────────────────────────────
function renderStats() {
  const alive=garden.filter(t=>!t.dead);
  const totalMin=alive.reduce((a,t)=>a+t.mins,0);
  const todayMin=alive.filter(t=>t.date===todayStr()).reduce((a,t)=>a+t.mins,0);
  document.getElementById('sTotalMin').textContent=totalMin;
  document.getElementById('sTotalTree').textContent=alive.length;
  document.getElementById('sToday').textContent=todayMin;
  document.getElementById('sStreak').textContent=calcStreak(alive);

  const chart=document.getElementById('chart'); chart.innerHTML='';
  const days=[];
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days.push(dateStr(d)); }
  const maxMin=Math.max(...days.map(d=>alive.filter(t=>t.date===d).reduce((a,t)=>a+t.mins,0)),1);
  days.forEach(d=>{
    const mins=alive.filter(t=>t.date===d).reduce((a,t)=>a+t.mins,0);
    const pct=Math.round((mins/maxMin)*80);
    const col=document.createElement('div'); col.className='bar-col';
    col.innerHTML=`<div class="bar-min">${mins||''}</div><div class="bar${d===todayStr()?' today':''}" style="height:${pct||2}px"></div><div class="bar-day">${d.slice(5).replace('-','/')}</div>`;
    chart.appendChild(col);
  });

  const rank=document.getElementById('rankList'); rank.innerHTML='';
  const cnt={},minsByTree={};
  alive.forEach(t=>{ const k=t.tree||'?'; cnt[k]=(cnt[k]||0)+1; minsByTree[k]=(minsByTree[k]||0)+t.mins; });
  const sorted=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,3);
  if(!sorted.length){ rank.innerHTML='<div style="color:var(--green-mid);font-size:.82rem;text-align:center;padding:20px">尚無資料，完成第一次專注吧！🌱</div>'; return; }
  const maxCnt=sorted[0][1];
  ['🥇','🥈','🥉'].forEach((medal,i)=>{
    if(!sorted[i]) return;
    const [id,c]=sorted[i];
    const tDef=TREES.find(x=>x.id===id);
    const row=document.createElement('div'); row.className='fav-card';
    row.innerHTML=`<div class="fav-rank-num">${medal}</div><div class="fav-emoji">${tDef?tDef.emoji:'🌳'}</div><div class="fav-info"><div class="fav-name">${tDef?tDef.name:'未知'}</div><div class="fav-bar-wrap"><div class="fav-bar" style="width:${Math.round(c/maxCnt*100)}%"></div></div><div class="fav-meta"><span class="fav-cnt">種了 ${c} 次</span><span class="fav-mins">共 ${minsByTree[id]||0} 分鐘</span></div></div>`;
    rank.appendChild(row);
  });
}

function calcStreak(alive) {
  if(!alive.length) return 0;
  const dates=[...new Set(alive.map(t=>t.date))].sort().reverse();
  let streak=0, cur=new Date();
  for(const d of dates){ if(d===dateStr(cur)){streak++;cur.setDate(cur.getDate()-1);}else break; }
  return streak;
}

// ─────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────
function burstPetals() {
  const el=document.getElementById('treeEmojiDisplay');
  if(!el) return;
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const petalEmoji=selTree.emojis[4]||'✨';
  const extra=['✨','🌟','💫','🎉'];
  for(let i=0;i<14;i++){
    setTimeout(()=>{
      const p=document.createElement('div'); p.className='particle';
      const angle=(i/14)*Math.PI*2, dist=60+Math.random()*60;
      p.style.left=(cx+Math.cos(angle)*20)+'px';
      p.style.top=(cy+Math.sin(angle)*20)+'px';
      p.style.setProperty('--px',Math.cos(angle)*dist+'px');
      p.style.setProperty('--py',Math.sin(angle)*dist+'px');
      p.style.setProperty('--pr',(Math.random()*360)+'deg');
      p.style.setProperty('--pd',(.8+Math.random()*.6)+'s');
      p.textContent=i%3===0?extra[Math.floor(Math.random()*4)]:petalEmoji;
      p.style.cssText+=';position:fixed;pointer-events:none;font-size:18px;animation:petalFly var(--pd) ease-out forwards;z-index:300;';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),1500);
    },i*60);
  }
}

function spawnParticle(emoji) {
  const el=document.createElement('div'); el.className='particle'; el.textContent=emoji;
  const rw=document.querySelector('.ring-wrap').getBoundingClientRect();
  el.style.left=(rw.left+rw.width/2+(Math.random()-.5)*80)+'px';
  el.style.top=(rw.top+rw.height/2+(Math.random()-.5)*60)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1900);
}

// UTILS
// ─────────────────────────────────────────
function todayStr(){ return dateStr(new Date()); }
function dateStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function save(){ localStorage.setItem('fg_garden2',JSON.stringify(garden)); }

async function saveToSupabase(entry) {
  if(!currentUser) return;
  await sb.from('garden').insert({user_id:currentUser.id,tree:entry.tree,emoji:entry.emoji,name:entry.name,mins:entry.mins,date:entry.date,dead:entry.dead});
}

async function loadFromSupabase() {
  if(!currentUser) return;
  const {data,error}=await sb.from('garden').select('*').order('created_at');
  if(!error&&data){ garden=data.map(r=>({tree:r.tree,emoji:r.emoji,name:r.name,mins:r.mins,date:r.date,dead:r.dead})); save(); }
}

// ─────────────────────────────────────────
// WAKE LOCK
// ─────────────────────────────────────────
async function requestWakeLock() {
  if(!('wakeLock' in navigator)) return;
  try { wakeLock=await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release',()=>{wakeLock=null;}); } catch(e){}
}
function releaseWakeLock(){ if(wakeLock){wakeLock.release();wakeLock=null;} }

document.addEventListener('visibilitychange',()=>{
  if(!isRunning) return;
  if(document.visibilityState==='visible'){
    requestWakeLock();
    const elapsed=Math.floor((Date.now()-startTimestamp)/1000);
    if(elapsed>=totalTime){clearInterval(timerId);finishFocus();}
  }
});

// ─────────────────────────────────────────
// INIT / AUTH
// ─────────────────────────────────────────
let isRecoveryMode=!!(window.location.hash&&window.location.hash.includes('type=recovery'));

function showResetPasswordUI() {
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('authSubtitle').textContent='請設定新密碼';
  document.getElementById('authEmail').style.display='none';
  document.getElementById('authToggle').style.display='none';
  document.querySelector('.auth-btn').textContent='確認新密碼';
  document.querySelector('.auth-btn').onclick=async()=>{
    const newPassword=document.getElementById('authPassword').value;
    const msg=document.getElementById('authMsg');
    if(!newPassword||newPassword.length<6){msg.className='auth-msg';msg.textContent='密碼至少需要6位';return;}
    msg.className='auth-msg ok';msg.textContent='更新中...';
    const {error}=await sb.auth.updateUser({password:newPassword});
    if(error){msg.className='auth-msg';msg.textContent='更新失敗：'+error.message;}
    else{
      msg.className='auth-msg ok';msg.textContent='✅ 密碼已更新，請重新登入';
      setTimeout(()=>{
        isRecoveryMode=false;window.location.hash='';
        document.getElementById('authEmail').style.display='block';
        document.getElementById('authToggle').style.display='block';
        document.querySelector('.auth-btn').textContent='登入';
        document.querySelector('.auth-btn').onclick=authSubmit;
        document.getElementById('authSubtitle').textContent='登入以同步你的森林紀錄';
        document.getElementById('authPassword').value='';
        document.getElementById('authMsg').textContent='';
      },2000);
    }
  };
}

async function initApp(session) {
  if(isRecoveryMode) return;
  if(!session){document.getElementById('authScreen').style.display='flex';return;}
  currentUser=session.user;
  document.getElementById('authScreen').style.display='none';
  await loadFromSupabase();
  const local=JSON.parse(localStorage.getItem('fg_garden2')||'[]');
  if(local.length>0&&garden.length===0){
    for(const entry of local){await saveToSupabase(entry);}
    await loadFromSupabase();
    localStorage.removeItem('fg_garden2');
  }
  garden=garden.map(e=>{
    if(!e.name||!e.emoji){const tDef=TREES.find(x=>x.id===e.tree);if(tDef){e.name=e.name||tDef.name;e.emoji=e.emoji||tDef.emoji;}}
    return e;
  });
  buildPicker();
  setStageDisplay(0,false);
  showTime(curMode*60);
  renderGarden();
  renderStats();
}

if(isRecoveryMode){
  const hashParams=new URLSearchParams(window.location.hash.slice(1));
  const tokenHash=hashParams.get('token_hash');
  showResetPasswordUI();
  if(tokenHash){
    sb.auth.verifyOtp({token_hash:tokenHash,type:'recovery'}).then(({error})=>{
      if(error){document.getElementById('authMsg').className='auth-msg';document.getElementById('authMsg').textContent='連結已失效，請重新申請';}
    });
  }
}

sb.auth.onAuthStateChange((event,session)=>{
  if(event==='SIGNED_IN'&&!isRecoveryMode) initApp(session);
  if(event==='SIGNED_OUT'){
    currentUser=null;garden=[];
    document.getElementById('authScreen').style.display='flex';
    document.getElementById('authEmail').value='';
    document.getElementById('authPassword').value='';
    document.getElementById('authMsg').textContent='';
  }
});

sb.auth.getSession().then(({data:{session}})=>{initApp(session);});

// drag-to-scroll picker
(function(){
  const wrap=document.getElementById('pickerScrollWrap');
  let isDown=false,startX,scrollLeft;
  wrap.addEventListener('mousedown',e=>{isDown=true;startX=e.pageX-wrap.offsetLeft;scrollLeft=wrap.scrollLeft;});
  wrap.addEventListener('mouseleave',()=>isDown=false);
  wrap.addEventListener('mouseup',()=>isDown=false);
  wrap.addEventListener('mousemove',e=>{if(!isDown)return;e.preventDefault();const x=e.pageX-wrap.offsetLeft;wrap.scrollLeft=scrollLeft-(x-startX);});
})();

// ── PWA SERVICE WORKER ──
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
