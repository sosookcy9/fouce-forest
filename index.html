<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>專注森林</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Google Fonts ── */
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap');

/* ══ TOKENS ══ */
:root {
  --bg:          #edf7f0;
  --surface:     #ffffff;
  --surface2:    rgba(255,255,255,0.72);
  --green-deep:  #1b4332;
  --green-mid:   #2d6a4f;
  --green-light: #52b788;
  --green-pale:  #b7e4c7;
  --red:         #c1440e;
  --shadow-sm:   0 2px 10px rgba(27,67,50,.08);
  --shadow-md:   0 4px 20px rgba(27,67,50,.13);
  --radius-sm:   12px;
  --radius-md:   18px;
  --radius-pill: 40px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Serif TC',serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  color:var(--green-deep);
}

/* ══ AUTH SCREEN ══ */
#authScreen{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;
}
.auth-box{width:100%;max-width:360px;background:var(--surface);border-radius:var(--radius-md);padding:28px 24px;box-shadow:var(--shadow-md);}
.auth-logo{font-size:2.5rem;text-align:center;margin-bottom:6px;}
.auth-title{font-size:1.1rem;font-weight:600;color:var(--green-deep);text-align:center;margin-bottom:4px;}
.auth-sub{font-size:.76rem;color:var(--green-mid);text-align:center;margin-bottom:24px;}
.auth-input{
  width:100%;padding:10px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--green-pale);font-family:'Noto Serif TC',serif;
  font-size:.88rem;color:var(--green-deep);outline:none;margin-bottom:10px;
  background:#fff;box-sizing:border-box;
}
.auth-input:focus{border-color:var(--green-mid);}
.auth-btn{
  width:100%;padding:11px;border:none;border-radius:var(--radius-pill);
  background:var(--green-deep);color:#fff;font-family:'Noto Serif TC',serif;
  font-size:.9rem;cursor:pointer;margin-bottom:8px;transition:background .2s;
}
.auth-btn:hover{background:var(--green-mid);}
.auth-toggle{font-size:.76rem;color:var(--green-mid);text-align:center;cursor:pointer;text-decoration:underline;}
.auth-msg{font-size:.74rem;text-align:center;margin-top:8px;min-height:18px;color:var(--red);}
.auth-msg.ok{color:var(--green-mid);}
.user-bar{
  display:flex;align-items:center;gap:6px;
  font-size:.7rem;color:var(--green-mid);
}
.logout-btn{
  padding:4px 10px;border-radius:var(--radius-pill);border:1.5px solid var(--green-pale);
  background:transparent;font-family:'Noto Serif TC',serif;font-size:.68rem;
  color:var(--green-mid);cursor:pointer;
}
/* ══ NAV ══ */
nav{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;
  position:sticky;top:0;z-index:50;
  background:rgba(237,247,240,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(183,228,199,.4);
}
.logo{font-size:.95rem;font-weight:600;letter-spacing:.04em;color:var(--green-deep);}
.nav-tabs{display:flex;gap:3px;background:rgba(255,255,255,.65);border-radius:var(--radius-pill);padding:3px;}
.nav-tab{
  padding:6px 16px;border-radius:var(--radius-pill);border:none;
  background:transparent;font-family:'Noto Serif TC',serif;
  font-size:.76rem;color:var(--green-mid);cursor:pointer;transition:all .22s;white-space:nowrap;
}
.nav-tab.active{background:var(--green-deep);color:#fff;box-shadow:0 2px 8px rgba(27,67,50,.2);}

/* ══ SCREENS ══ */
.screen{display:none;width:100%;max-width:480px;flex:1;flex-direction:column;align-items:center;padding:16px 16px 80px;}
.screen.active{display:flex;}

/* ══════════════════════════
   TIMER SCREEN
══════════════════════════ */
.mode-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;}
.mode-btn{
  padding:5px 14px;border-radius:var(--radius-pill);
  border:1.5px solid var(--green-pale);background:var(--surface2);
  font-family:'Noto Serif TC',serif;font-size:1rem;color:var(--green-mid);
  cursor:pointer;transition:all .2s;
}
.mode-btn.active{background:var(--green-mid);color:#fff;border-color:var(--green-mid);}
.mode-btn:hover:not(.active){border-color:var(--green-light);background:#fff;}

/* Ring */
.ring-wrap{position:relative;width:260px;height:260px;margin-bottom:14px;flex-shrink:0;}
.ring-svg{width:260px;height:260px;transform:rotate(-90deg);}
.ring-track{fill:none;stroke:rgba(255,255,255,.5);stroke-width:9;}
.ring-fill{fill:none;stroke:var(--green-mid);stroke-width:9;stroke-linecap:round;stroke-dasharray:723;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .5s;}
.ring-fill.dying{stroke:var(--red);}

/* Ring inner card */
.ring-inner{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(6px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
}
.tree-emoji-display{
  font-size:60px;line-height:1;
  transition:font-size 1.1s cubic-bezier(.34,1.56,.64,1),filter .8s;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.12));
  user-select:none;
}
@keyframes treePulse{0%,100%{transform:scale(1) rotate(0);}35%{transform:scale(1.06) rotate(-1.5deg);}65%{transform:scale(1.04) rotate(1deg);}}
@keyframes treeGrow{0%{transform:scale(.65);opacity:.5;}100%{transform:scale(1);opacity:1;}}
@keyframes treeBoom{0%{transform:scale(1);}40%{transform:scale(1.4) rotate(-3deg);}75%{transform:scale(.95) rotate(2deg);}100%{transform:scale(1.1);}}
.tree-breathing{animation:treePulse 3.8s ease-in-out infinite;}
.tree-grow-anim{animation:treeGrow .45s cubic-bezier(.34,1.56,.64,1) both;}
.tree-boom{animation:treeBoom .55s cubic-bezier(.34,1.56,.64,1) both;}

.timer-num{font-family:'DM Mono',monospace;font-size:2rem;font-weight:300;color:var(--green-deep);letter-spacing:-.02em;line-height:1;}
.timer-lbl{font-size:.62rem;color:var(--green-light);letter-spacing:.14em;text-transform:uppercase;}

.status-msg{font-size:.82rem;color:var(--green-mid);text-align:center;min-height:20px;margin-bottom:12px;transition:color .4s;}
.status-msg.fail{color:var(--red);}

/* Time input */
.time-row{
  display:flex;align-items:center;gap:8px;margin-bottom:18px;
  background:var(--surface2);padding:8px 20px;border-radius:var(--radius-pill);
  font-size:.82rem;color:var(--green-mid);
  border:1px solid rgba(183,228,199,.5);
}
.time-row input{
  width:48px;padding:3px 6px;
  border:1.5px solid var(--green-pale);border-radius:8px;
  font-family:'DM Mono',monospace;font-size:.9rem;text-align:center;
  background:#fff;color:var(--green-deep);outline:none;
}
.time-row input:focus{border-color:var(--green-mid);}

/* Picker */
.picker-label{font-size:.72rem;color:var(--green-mid);margin-bottom:8px;letter-spacing:.06em;align-self:flex-start;}
.picker-scroll-wrap{
  width:calc(100% + 32px);margin-left:-16px;margin-bottom:16px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  padding:4px 16px 10px;cursor:grab;
}
.picker-scroll-wrap::-webkit-scrollbar{display:none;}
.picker-scroll-wrap:active{cursor:grabbing;}
.tree-picker{display:grid;grid-template-rows:repeat(2,1fr);grid-auto-flow:column;grid-auto-columns:68px;gap:7px;width:max-content;}
.picker-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:9px 6px 7px;border-radius:14px;border:2px solid transparent;
  cursor:pointer;background:var(--surface2);transition:all .18s;
  width:68px;user-select:none;
}
.picker-item:hover{border-color:var(--green-pale);background:#fff;}
.picker-item.selected{border-color:var(--green-mid);background:#fff;box-shadow:var(--shadow-sm);}
.picker-item .mini-tree{font-size:28px;line-height:1;}
.picker-item .mini-name{font-size:.58rem;color:var(--green-mid);text-align:center;line-height:1.3;}

/* Buttons */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.btn{padding:11px 28px;border:none;border-radius:var(--radius-pill);font-family:'Noto Serif TC',serif;font-size:.86rem;cursor:pointer;transition:all .22s;}
.btn-primary{background:var(--green-deep);color:#fff;box-shadow:0 3px 12px rgba(27,67,50,.25);}
.btn-primary:hover{background:var(--green-mid);transform:translateY(-1px);}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid rgba(193,68,14,.4);}
.btn-danger:hover{background:var(--red);color:#fff;border-color:var(--red);}

/* Petal burst */
@keyframes petalFly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0);}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(.3) rotate(var(--pr));}}
.petal{position:absolute;font-size:16px;top:50%;left:50%;animation:petalFly var(--pd) ease-out forwards;pointer-events:none;z-index:10;}

/* ══════════════════════════
   GARDEN SCREEN
══════════════════════════ */
#gardenScreen{background:#f1f8f2;min-height:100vh;padding:0;max-width:100%;width:100%;}
.garden-topbar{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:16px 18px 14px;
  border-bottom:1px solid rgba(183,228,199,.5);
}
.garden-title{font-size:.95rem;font-weight:600;color:var(--green-deep);}
.garden-count{font-size:.72rem;color:var(--green-mid);}
.garden-scroll-wrap{width:100%;overflow-y:auto;padding:14px;}
.garden-grid-topview{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;}

.gtv-cell{
  aspect-ratio:1;border-radius:var(--radius-sm);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;position:relative;overflow:hidden;transition:transform .14s;
}
.gtv-cell.has-tree{background:linear-gradient(145deg,#d4edda,#b7e4c7);box-shadow:var(--shadow-sm);}
.gtv-cell.has-tree:active{transform:scale(.92);}
.gtv-cell.dead-tree{background:linear-gradient(145deg,#ece6df,#d9cec5);}
.gtv-cell.empty-cell{background:rgba(183,228,199,.2);border:1.5px dashed rgba(82,183,136,.25);}
.gtv-emoji{font-size:26px;line-height:1;}
.gtv-label{font-size:.5rem;color:var(--green-deep);text-align:center;line-height:1.4;padding:0 2px;}
.gtv-cell.dead-tree .gtv-label{color:#8a7060;}
.gtv-tip{
  position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);
  background:rgba(10,30,18,.88);color:#d8f3dc;
  font-size:.58rem;white-space:nowrap;padding:4px 8px;border-radius:8px;
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:20;
  font-family:'Noto Serif TC',serif;
}
.gtv-cell:hover .gtv-tip{opacity:1;}
.garden-legend{
  padding:10px 14px 20px;display:flex;gap:12px;flex-wrap:wrap;
  color:var(--green-mid);font-size:.66rem;
}
.garden-legend span{display:flex;align-items:center;gap:3px;}

/* ══════════════════════════
   STATS SCREEN
══════════════════════════ */
.stats-section{
  width:100%;background:var(--surface);border-radius:var(--radius-md);
  padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);
}
.stats-section h3{
  font-size:.72rem;color:var(--green-light);letter-spacing:.08em;
  margin-bottom:12px;text-transform:uppercase;font-weight:400;
}

/* Summary cards */
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-card{background:var(--bg);border-radius:var(--radius-sm);padding:14px;text-align:center;}
.stat-card .s-val{font-family:'DM Mono',monospace;font-size:1.5rem;color:var(--green-deep);line-height:1;}
.stat-card .s-lbl{font-size:.64rem;color:var(--green-mid);margin-top:4px;}

/* Bar chart */
.chart-wrap{width:100%;overflow-x:auto;}
.chart{display:flex;align-items:flex-end;gap:5px;height:80px;padding-bottom:2px;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:26px;}
.bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(to top,var(--green-mid),var(--green-light));min-height:2px;transition:height .7s ease;}
.bar.today{background:linear-gradient(to top,var(--green-deep),var(--green-mid));}
.bar-day{font-size:.54rem;color:var(--green-mid);}
.bar-min{font-size:.54rem;color:var(--green-deep);font-family:'DM Mono',monospace;}

/* Fav tree cards */
.fav-tree-cards{display:flex;flex-direction:column;gap:10px;}
.fav-card{display:flex;align-items:center;gap:12px;background:var(--bg);border-radius:var(--radius-sm);padding:12px 14px;}
.fav-rank-num{font-size:1rem;width:24px;flex-shrink:0;text-align:center;}
.fav-emoji{font-size:34px;flex-shrink:0;}
.fav-info{flex:1;min-width:0;}
.fav-name{font-size:.88rem;font-weight:600;color:var(--green-deep);margin-bottom:5px;}
.fav-bar-wrap{height:6px;background:rgba(82,183,136,.15);border-radius:10px;}
.fav-bar{height:100%;border-radius:10px;background:linear-gradient(to right,var(--green-mid),var(--green-light));transition:width 1s ease;}
.fav-meta{display:flex;justify-content:space-between;margin-top:5px;}
.fav-cnt{font-size:.66rem;color:var(--green-mid);}
.fav-mins{font-size:.66rem;color:var(--green-light);}



/* ══ Overlay ══ */
.overlay{
  position:fixed;inset:0;background:rgba(178,231,200,.9);
  backdrop-filter:blur(8px);z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.overlay-tree{font-size:72px;animation:pop .5s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes pop{from{transform:scale(0) rotate(-10deg);}to{transform:scale(1) rotate(0);}}
.overlay-title{font-size:1.25rem;font-weight:600;color:var(--green-deep);}
.overlay-sub{font-size:.82rem;color:var(--green-mid);margin-bottom:12px;}

/* Particles */
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-90px) scale(.4);}}
.particle{position:fixed;pointer-events:none;font-size:16px;animation:floatUp 1.8s ease-out forwards;z-index:300;}
@keyframes fallLeaf{0%{opacity:1;transform:translate(0,0) rotate(0);}100%{opacity:0;transform:translate(var(--dx),55px) rotate(var(--dr));}}
.fall-leaf{position:absolute;animation:fallLeaf 1.4s ease-in forwards;}
/* ── 新增樹種 CSS ── */
.sunflower .t-body{width:80px;height:80px;background:radial-gradient(circle,#ffd60a 60%,#e9c46a);bottom:44px;}
.sunflower .t-trunk{background:#606c38;}
.rose .t-body{width:76px;height:76px;background:radial-gradient(circle,#e63946,#9d0208);bottom:44px;border-radius:40% 60% 55% 45%;}
.tulip .t-body{width:60px;height:80px;background:radial-gradient(circle,#e07af5,#9b2226);bottom:44px;border-radius:50% 50% 30% 30%;}
.lavender .t-body{width:70px;height:84px;background:linear-gradient(to top,#7b2d8b,#c77dff,#e0aaff);bottom:44px;border-radius:30% 30% 50% 50%;}
.lavender .t-trunk{background:#6a994e;}
.plum .t-body{width:82px;height:76px;background:radial-gradient(circle,#ffc8dd,#ff85a1,#c77dff);bottom:44px;}
.peach .t-body{width:84px;height:76px;background:radial-gradient(circle,#ffb3c6,#ff758f,#ffccd5);bottom:44px;}
.daisy .t-body{width:78px;height:72px;background:radial-gradient(circle,#ffffff 30%,#ffe66d 50%,#80b918 100%);bottom:44px;}
.clover .t-body{width:80px;height:68px;background:radial-gradient(circle,#95d5b2,#52b788,#2d6a4f);bottom:12px;border-radius:50%;}
.clover .t-trunk{width:0;height:0;}
.cactus .t-trunk{width:22px;height:56px;background:linear-gradient(to right,#52b788,#40916c,#52b788);border-radius:10px;}
.cactus .t-body{width:38px;height:32px;background:linear-gradient(to right,#52b788,#40916c);bottom:34px;left:30px;border-radius:20px 20px 0 0;}
.mushroom .t-trunk{width:20px;height:22px;background:#e9d8a6;border-radius:4px;}
.mushroom .t-body{width:80px;height:52px;background:radial-gradient(circle,#ae2012,#9b2226);bottom:22px;border-radius:50% 50% 20% 20%;}
.mushroom.stage-4 .t-body{background:radial-gradient(circle,#ee9b00,#ca6702);}
.xmas .t-body{width:78px;height:92px;background:linear-gradient(160deg,#2d6a4f,#1b4332);clip-path:polygon(50% 0%,5% 60%,20% 60%,0% 100%,100% 100%,80% 60%,95% 60%);border-radius:0;bottom:44px;}
.xmas.stage-4 .t-body{background:linear-gradient(160deg,#2d6a4f,#1b4332);filter:drop-shadow(0 0 8px #ffd60a);}
.snowflake .t-body{width:82px;height:82px;background:radial-gradient(circle,#caf0f8,#90e0ef,#0096c7);bottom:44px;}
.snowflake .t-trunk{background:#adb5bd;}
.bonsai .t-body{width:88px;height:66px;background:radial-gradient(circle,#74c69d,#2d6a4f);bottom:44px;border-radius:50% 50% 40% 40%;}
.bonsai .t-trunk{width:12px;height:36px;background:#6d4c3c;border-radius:3px;}
.mangrove .t-body{width:90px;height:72px;background:radial-gradient(circle,#95d5b2,#40916c,#1b4332);bottom:20px;border-radius:40% 40% 50% 50%;}
.mangrove .t-trunk{width:18px;height:28px;background:#6d4c3c;}
.reed .t-body{width:54px;height:80px;background:linear-gradient(to top,#a98467,#ccd5ae,#d4edda);bottom:0;border-radius:20% 20% 0 0;}
.reed .t-trunk{width:0;height:0;}
.willow .t-body{width:92px;height:80px;background:radial-gradient(circle,#b7e4c7 30%,#52b788 60%,#2d6a4f);bottom:44px;border-radius:50% 50% 60% 60%;}


/* ── Emoji tree display ── */
.tree-emoji-display{
  font-size:64px;
  line-height:1;
  transition:font-size 1.2s cubic-bezier(.34,1.56,.64,1), filter .8s;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.15));
  user-select:none;
  margin-bottom:4px;
}
@keyframes treePulse{
  0%,100%{transform:scale(1) rotate(0deg);}
  30%{transform:scale(1.06) rotate(-1deg);}
  60%{transform:scale(1.04) rotate(1deg);}
}
@keyframes treeGrow{
  0%{transform:scale(.7);opacity:.6;}
  100%{transform:scale(1);opacity:1;}
}
@keyframes treeBoom{
  0%{transform:scale(1);}
  40%{transform:scale(1.35) rotate(-3deg);}
  70%{transform:scale(.95) rotate(2deg);}
  100%{transform:scale(1.1) rotate(0deg);}
}
.tree-breathing{animation:treePulse 3.5s ease-in-out infinite;}
.tree-grow-anim{animation:treeGrow .5s cubic-bezier(.34,1.56,.64,1) both;}
.tree-boom{animation:treeBoom .6s cubic-bezier(.34,1.56,.64,1) both;}

/* Petal/leaf burst ring */
@keyframes petalFly{
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg);}
  100%{opacity:0;transform:translate(var(--px),var(--py)) scale(.3) rotate(var(--pr));}
}
.petal{
  position:absolute;font-size:16px;
  top:50%;left:50%;
  animation:petalFly var(--pd) ease-out forwards;
  pointer-events:none;z-index:10;
}

</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">🌿</div>
    <div class="auth-title">專注森林</div>
    <div class="auth-sub" id="authSubtitle">登入以同步你的森林紀錄</div>
    <input class="auth-input" type="email" id="authEmail" placeholder="電子郵件">
    <input class="auth-input" type="password" id="authPassword" placeholder="密碼（至少6位）">
    <button class="auth-btn" onclick="authSubmit()">登入</button>
    <div class="auth-toggle" onclick="toggleAuthMode()" id="authToggle">還沒有帳號？點此註冊</div>
    <div class="auth-toggle" style="margin-top:6px;color:var(--green-light);" onclick="forgotPassword()">忘記密碼？</div>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<nav>
  <div class="logo">🌿 專注森林</div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="go('timer')">種樹</button>
      <button class="nav-tab" onclick="go('garden')">花園</button>
      <button class="nav-tab" onclick="go('stats')">統計</button>
    </div>

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let garden    = [];
let selTree   = TREES[0];
let isRunning = false;
let timeLeft  = 0, totalTime = 0;
let timerId   = null;
let curMode   = 25;
const CIRC    = 2 * Math.PI * 115; // ~722.6
let wakeLock  = null;
let startTimestamp = null;

// ─────────────────────────────────────────
// NAV
// ─────────────────────────────────────────
function go(tab) {
  document.querySelectorAll('.nav-tab').forEach((t,i)=>{
    t.classList.toggle('active', t.textContent.trim().startsWith(
      tab==='timer'?'種':tab==='garden'?'花':'統'));
  });
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(tab+'Screen').classList.add('active');
  if(tab==='garden') renderGarden();
  if(tab==='stats')  renderStats();
}

// ─────────────────────────────────────────
// TREE PICKER
// ─────────────────────────────────────────
function buildPicker() {
  const wrap = document.getElementById('treePicker');
  wrap.innerHTML = '';
  TREES.forEach(t => {
    const d = document.createElement('div');
    d.className = 'picker-item' + (t.id===selTree.id?' selected':'');
    d.innerHTML = `<div class="mini-tree">${t.emoji}</div><div class="mini-name">${t.name}</div>`;
    d.onclick = () => {
      selTree = t;
      document.querySelectorAll('.picker-item').forEach(x=>x.classList.remove('selected'));
      d.classList.add('selected');
      setEmojiStage(0, false);
    };
    wrap.appendChild(d);
  });
}

// ─────────────────────────────────────────
// EMOJI TREE DISPLAY
// ─────────────────────────────────────────
// Growth stages: [seed, sprout, small, full, bloom]
// Each tree has 5 emoji stages
const TREE_STAGES = {
  oak:       ['🌱','🌿','🌳','🌳','🌳'],
  sakura:    ['🌱','🌿','🌸','🌸','🌸'],
  pine:      ['🌱','🌿','🌲','🌲','🌲'],
  maple:     ['🌱','🌿','🍁','🍂','🍁'],
  bamboo:    ['🌱','🎍','🎋','🎋','🎋'],
  palm:      ['🌱','🌿','🌴','🌴','🌴'],
  hibiscus:  ['🌱','🌿','🌺','🌺','🌺'],
  moss:      ['🌱','🌿','🍀','🍀','☘️'],
  sunflower: ['🌱','🌿','🌻','🌻','🌻'],
  rose:      ['🌱','🌿','🥀','🌹','🌹'],
  tulip:     ['🌱','🌿','🌷','🌷','🌷'],
  lavender:  ['🌱','🌿','💐','💜','💜'],
  plum:      ['🌱','🌿','🌼','🌼','🌸'],
  peach:     ['🌱','🌿','🍑','🌸','🌸'],
  daisy:     ['🌱','🌿','🌼','🌸','🌸'],
  clover:    ['🌱','🌿','☘️','🍀','🍀'],
  cactus:    ['🌱','🌵','🌵','🌵','🌵'],
  mushroom:  ['🌱','🍄','🍄','🍄','🍄'],
  xmas:      ['🌱','🌲','🎄','🎄','🎄'],
  snowflake: ['🌱','🌿','❄️','🌨️','❄️'],
  bonsai:    ['🌱','🌿','🎋','🌳','🌳'],
  mangrove:  ['🌱','🌿','🌿','🌳','🌳'],
  reed:      ['🌱','🌾','🌾','🌾','🌾'],
  willow:    ['🌱','🌿','🍃','🌳','🌳'],
};

let currentStageIdx = 0;

function getStageEmoji(stageIdx) {
  const stages = TREE_STAGES[selTree.id] || ['🌱','🌿','🌿','🌳','🌸'];
  return stages[Math.min(stageIdx, stages.length-1)];
}

function setEmojiStage(stageIdx, animate=true) {
  const el = document.getElementById('treeEmojiDisplay');
  if (!el) return;
  const emoji = getStageEmoji(stageIdx);
  const sizes = ['52px','62px','72px','80px','88px'];
  // Only animate if emoji actually changes
  if (el.textContent !== emoji) {
    el.classList.remove('tree-grow-anim','tree-boom','tree-breathing');
    el.textContent = emoji;
    el.style.fontSize = sizes[stageIdx] || '80px';
    void el.offsetWidth; // reflow
    if (animate) el.classList.add('tree-grow-anim');
  } else {
    el.style.fontSize = sizes[stageIdx] || '80px';
  }
  currentStageIdx = stageIdx;
}

function setStage(stageIdx) { setEmojiStage(stageIdx); }
function setDeadStage() {
  const el = document.getElementById('treeEmojiDisplay');
  if (!el) return;
  el.classList.remove('tree-grow-anim','tree-boom','tree-breathing');
  el.textContent = '🥀';
  el.style.fontSize = '72px';
  el.style.filter = 'grayscale(.5) drop-shadow(0 4px 8px rgba(0,0,0,.2))';
}
function applyTreeClass() {} // no-op kept for compat

// ─────────────────────────────────────────
// MODE
// ─────────────────────────────────────────
function setMode(m) {
  if(isRunning) return;
  curMode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>{
    const val = parseInt(b.textContent);
    b.classList.toggle('active', val===m);
  });
  updateDisplay();
}

function updateDisplay() {
  showTime(curMode * 60);
}

function showTime(s) {
  const m = Math.floor(s/60), sec = s%60;
  document.getElementById('timerNum').textContent =
    `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ─────────────────────────────────────────
// FOCUS
// ─────────────────────────────────────────
function startFocus() {
  const mins = curMode;
  totalTime = mins * 60;
  timeLeft  = totalTime;
  startTimestamp = Date.now();
  isRunning = true;

  setEmojiStage(0, false);
  const el = document.getElementById('treeEmojiDisplay');
  if(el){ el.style.filter=''; el.classList.remove('tree-breathing'); }
  setRing(0);
  document.getElementById('ringFill').classList.remove('dying');
  document.getElementById('timerLbl').textContent = '專注中';
  document.getElementById('statusMsg').className = 'status-msg';
  document.getElementById('statusMsg').textContent = `🌱 ${selTree.name}正在生長，加油！`;

  document.getElementById('modeRow').style.display = 'none';
  document.getElementById('pickerScrollWrap').style.display = 'none';
  document.getElementById('btnRow').innerHTML =
    `<button class="btn btn-danger" onclick="giveUp()">放棄（樹枯死）</button>`;

  void el.offsetWidth;
  el.classList.add('tree-breathing');
  timerId = setInterval(tick, 1000);
  requestWakeLock();
}

function tick() {
  const elapsed = Math.floor((Date.now() - startTimestamp) / 1000);
  timeLeft = Math.max(totalTime - elapsed, 0);
  showTime(timeLeft);
  const prog = elapsed / totalTime;
  setRing(Math.min(prog, 1));
  const stageIdx = prog < .15 ? 0
    : prog < .35 ? 1
    : prog < .60 ? 2
    : prog < .85 ? 3
    : 3;
  if (stageIdx !== currentStageIdx) setEmojiStage(stageIdx);
  const particles = ['🍃','🌿','✨','💨'];
  if(Math.random()<.06) spawnParticle(particles[Math.floor(Math.random()*particles.length)]);
  if(timeLeft<=0) finishFocus();
}

function setRing(ratio) {
  document.getElementById('ringFill').style.strokeDashoffset = CIRC*(1-ratio);
}

function finishFocus() {
  clearInterval(timerId); isRunning=false;
  releaseWakeLock();
  const tEl = document.getElementById('treeEmojiDisplay');
  if(tEl){ tEl.classList.remove('tree-breathing'); }
  setEmojiStage(4);
  if(tEl){ void tEl.offsetWidth; tEl.classList.add('tree-boom'); }
  // Petal burst
  burstPetals();
  const entry = {
    tree: selTree.id, emoji: selTree.emoji, name: selTree.name,
    mins: Math.round(totalTime/60),
    date: todayStr(), dead: false
  };
  garden.push(entry); save(); saveToSupabase(entry);

  for(let i=0;i<10;i++) setTimeout(()=>spawnParticle(['🌸','🌺','🍀','✨','🌿'][Math.floor(Math.random()*5)]),i*100);

  document.getElementById('overlayEmoji').textContent = selTree.bloomEmoji;
  document.getElementById('overlaySub').textContent =
    `${entry.mins} 分鐘的 ${entry.name} 已種進森林！`;
  document.getElementById('overlay').style.display='flex';
}

function dismissOverlay() {
  document.getElementById('overlay').style.display='none';
  resetUI();
}

function giveUp() {
  // Custom confirm dialog (iOS Safari confirm() can be unreliable in some contexts)
  const dialog = document.createElement('div');
  dialog.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;';
  dialog.innerHTML = `
    <div style="background:#fff;border-radius:20px;padding:28px 24px;max-width:300px;width:88%;text-align:center;font-family:'Noto Serif TC',serif;">
      <div style="font-size:2.2rem;margin-bottom:10px;">🥀</div>
      <div style="font-size:1rem;color:#1b4332;font-weight:600;margin-bottom:6px;">確定放棄？</div>
      <div style="font-size:.82rem;color:#2d6a4f;margin-bottom:20px;">樹會枯死喔</div>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button id="giveUpCancel" style="flex:1;padding:10px;border-radius:40px;border:1.5px solid #b7e4c7;background:#fff;font-family:'Noto Serif TC',serif;font-size:.88rem;color:#2d6a4f;cursor:pointer;">繼續專注</button>
        <button id="giveUpConfirm" style="flex:1;padding:10px;border-radius:40px;border:none;background:#c1440e;color:#fff;font-family:'Noto Serif TC',serif;font-size:.88rem;cursor:pointer;">放棄</button>
      </div>
    </div>`;
  document.body.appendChild(dialog);
  document.getElementById('giveUpCancel').onclick = () => dialog.remove();
  document.getElementById('giveUpConfirm').onclick = () => {
    dialog.remove();
    clearInterval(timerId); isRunning=false;
    releaseWakeLock();
    const gEl = document.getElementById('treeEmojiDisplay');
    if(gEl) gEl.classList.remove('tree-breathing');
    setDeadStage();
    document.getElementById('ringFill').classList.add('dying');
    document.getElementById('timerLbl').textContent='已放棄';
    document.getElementById('statusMsg').className='status-msg fail';
    document.getElementById('statusMsg').textContent='哎呀…樹枯死了 🥀';
    const c = document.getElementById('treeEmojiDisplay');
    if(c){['🍂','🍁','🍂'].forEach((l,i)=>{
      const el=document.createElement('span');
      el.className='fall-leaf';
      el.textContent=l;
      el.style.cssText=`--dx:${(Math.random()-.5)*50}px;--dr:${(Math.random()-.5)*80}deg;top:10%;left:${20+i*25}%;font-size:14px;position:absolute;`;
      c.style.position='relative';
      c.appendChild(el);
      setTimeout(()=>el.remove(),1600);
    });}
    const entry={tree:selTree.id,emoji:selTree.emoji,name:selTree.name,
      mins:Math.round((totalTime-timeLeft)/60)||0,date:todayStr(),dead:true};
    garden.push(entry); save(); saveToSupabase(entry);
    setTimeout(resetUI,1900);
  };
}

function resetUI() {
  isRunning=false;
  startTimestamp=null;
  setStage(0);
  setRing(0);
  document.getElementById('ringFill').classList.remove('dying');
  document.getElementById('timerLbl').textContent='準備開始';
  document.getElementById('statusMsg').className='status-msg';
  document.getElementById('statusMsg').textContent='選好樹種，種下你的專注';
  document.getElementById('modeRow').style.display='flex';
  document.getElementById('pickerScrollWrap').style.display='block';
  const rEl = document.getElementById('treeEmojiDisplay');
  if(rEl){ rEl.classList.remove('tree-breathing','tree-boom','tree-grow-anim'); rEl.style.filter=''; }
  document.getElementById('btnRow').innerHTML=
    `<button class="btn btn-primary" onclick="startFocus()">🌱 開始種植</button>`;
  updateDisplay();
  go('timer');
}

// ─────────────────────────────────────────
// GARDEN  –  top-view grid
// ─────────────────────────────────────────
function renderGarden() {
  const grid = document.getElementById('gardenGridTV');
  const alive = garden.filter(t=>!t.dead);
  document.getElementById('gardenCount').textContent =
    `${alive.length} 棵 · 共 ${garden.length} 次`;

  grid.innerHTML = '';
  // Total cells: all entries + some empty padding
  const TOTAL = Math.max(Math.ceil((garden.length + 5) / 5) * 5, 20);

  for (let i = 0; i < TOTAL; i++) {
    const cell = document.createElement('div');
    const entry = garden[i];

    if (entry) {
      const tDef = TREES.find(x => x.id === entry.tree);
      const tName  = entry.name  || (tDef ? tDef.name  : '未知');
      const tEmoji = entry.dead ? '🥀' : (entry.emoji || (tDef ? tDef.emoji : '🌳'));
      cell.className = 'gtv-cell ' + (entry.dead ? 'dead-tree' : 'has-tree');
      cell.innerHTML = `
        <div class="gtv-tip">${tName}・${entry.date}・${entry.mins}分${entry.dead?' 💀':'✓'}</div>
        <div class="gtv-emoji">${tEmoji}</div>
        <div class="gtv-label">${tName}<br>${entry.mins}分</div>`;
    } else {
      cell.className = 'gtv-cell empty-cell';
    }
    grid.appendChild(cell);
  }
}
// ─────────────────────────────────────────
// STATS
// ─────────────────────────────────────────
function renderStats() {
  const alive=garden.filter(t=>!t.dead);
  const totalMin=alive.reduce((a,t)=>a+t.mins,0);
  const todayMin=alive.filter(t=>t.date===todayStr()).reduce((a,t)=>a+t.mins,0);

  document.getElementById('sTotalMin').textContent=totalMin;
  document.getElementById('sTotalTree').textContent=alive.length;
  document.getElementById('sToday').textContent=todayMin;
  document.getElementById('sStreak').textContent=calcStreak(alive);

  // 7-day bar chart
  const chart=document.getElementById('chart');
  chart.innerHTML='';
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    days.push(dateStr(d));
  }
  const maxMin=Math.max(...days.map(d=>alive.filter(t=>t.date===d).reduce((a,t)=>a+t.mins,0)),1);
  days.forEach(d=>{
    const mins=alive.filter(t=>t.date===d).reduce((a,t)=>a+t.mins,0);
    const pct=Math.round((mins/maxMin)*80);
    const isToday=d===todayStr();
    const label=d.slice(5).replace('-','/');
    const col=document.createElement('div');
    col.className='bar-col';
    col.innerHTML=`<div class="bar-min">${mins||''}</div>
      <div class="bar ${isToday?'today':''}" style="height:${pct||2}px"></div>
      <div class="bar-day">${label}</div>`;
    chart.appendChild(col);
  });

  // Favourite tree TOP 3
  const rank = document.getElementById('rankList');
  rank.innerHTML = '';
  const cnt = {}, minsByTree = {};
  alive.forEach(t => {
    // Always resolve name from TREES array to avoid undefined
    const tDef = TREES.find(x => x.id === t.tree);
    const key = t.tree || t.id || 'unknown';
    cnt[key] = (cnt[key] || 0) + 1;
    minsByTree[key] = (minsByTree[key] || 0) + t.mins;
  });
  const sorted = Object.entries(cnt).sort((a,b) => b[1]-a[1]).slice(0, 3);
  const maxCnt = sorted[0] ? sorted[0][1] : 1;

  if (!sorted.length) {
    rank.innerHTML = '<div style="color:var(--green-mid);font-size:.82rem;text-align:center;padding:20px">尚無資料，完成第一次專注吧！🌱</div>';
    return;
  }

  const podiumOrder = sorted.length >= 3 ? [sorted[1], sorted[0], sorted[2]] : sorted.map(x=>x);
  const podiumRanks = sorted.length >= 3 ? [2, 1, 3] : [1, 2, 3];
  const podiumHeights = ['110px', '140px', '90px'];
  const podiumColors  = ['#a8d5ba', '#52b788', '#cfe8d4'];
  const medals = ['🥇','🥈','🥉'];

  // ── Podium row ──
  const podium = document.createElement('div');
  podium.style.cssText = 'display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:20px;';

  (sorted.length >= 3 ? [
    {entry:sorted[1], rank:2, h:'108px', col:'#a8d5ba'},
    {entry:sorted[0], rank:1, h:'140px', col:'#52b788'},
    {entry:sorted[2], rank:3, h:'82px',  col:'#cfe8d4'},
  ] : sorted.map((e,i)=>({entry:e, rank:i+1, h:['140px','108px','82px'][i], col:['#52b788','#a8d5ba','#cfe8d4'][i]}))).forEach(({entry, rank, h, col}) => {
    const [id, c] = entry;
    const tDef = TREES.find(x => x.id === id);
    const tEmoji = tDef ? tDef.emoji : '🌳';
    const tName  = tDef ? tDef.name  : '未知';
    const totalMins = minsByTree[id] || 0;

    const col2 = document.createElement('div');
    col2.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;max-width:110px;';
    col2.innerHTML = `
      <div style="font-size:${rank===1?'44px':'36px'};line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.15))">${tEmoji}</div>
      <div style="font-size:.82rem;font-weight:600;color:var(--green-deep)">${tName}</div>
      <div style="font-size:.68rem;color:var(--green-mid)">${c} 次・${totalMins} 分</div>
      <div style="width:100%;background:${col};border-radius:12px 12px 0 0;height:${h};display:flex;align-items:flex-start;justify-content:center;padding-top:10px;font-size:1.2rem;">
        ${medals[rank-1]}
      </div>`;
    podium.appendChild(col2);
  });
  rank.appendChild(podium);

  // ── Detail list below podium ──
  sorted.forEach(([id, c], i) => {
    const tDef = TREES.find(x => x.id === id);
    const tEmoji = tDef ? tDef.emoji : '🌳';
    const tName  = tDef ? tDef.name  : '未知';
    const totalMins = minsByTree[id] || 0;
    const pct = Math.round(c / maxCnt * 100);
    const row = document.createElement('div');
    row.className = 'fav-card';
    row.innerHTML = `
      <div class="fav-rank-num">${medals[i]}</div>
      <div class="fav-emoji">${tEmoji}</div>
      <div class="fav-info">
        <div class="fav-name">${tName}</div>
        <div class="fav-bar-wrap"><div class="fav-bar" style="width:${pct}%"></div></div>
        <div class="fav-meta">
          <span class="fav-cnt">種了 ${c} 次</span>
          <span class="fav-mins">共 ${totalMins} 分鐘</span>
        </div>
      </div>`;
    rank.appendChild(row);
  });
}

function calcStreak(alive) {
  if(!alive.length) return 0;
  const dates=[...new Set(alive.map(t=>t.date))].sort().reverse();
  let streak=0, cur=new Date();
  for(const d of dates){
    if(d===dateStr(cur)){ streak++; cur.setDate(cur.getDate()-1); }
    else break;
  }
  return streak;
}

// ─────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────
function burstPetals() {
  const el = document.getElementById('treeEmojiDisplay');
  if(!el) return;
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top  + rect.height/2;
  const blooms = TREE_STAGES[selTree.id]||[];
  const petalEmoji = blooms[4]||blooms[3]||'✨';
  const extra = ['✨','🌟','💫','🎉'];
  for(let i=0;i<14;i++){
    setTimeout(()=>{
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (i/14)*Math.PI*2;
      const dist  = 60+Math.random()*60;
      p.style.left = (cx + Math.cos(angle)*20) + 'px';
      p.style.top  = (cy + Math.sin(angle)*20) + 'px';
      p.style.setProperty('--px', Math.cos(angle)*dist+'px');
      p.style.setProperty('--py', Math.sin(angle)*dist+'px');
      p.style.setProperty('--pr', (Math.random()*360)+'deg');
      p.style.setProperty('--pd', (.8+Math.random()*.6)+'s');
      p.textContent = i%3===0 ? extra[Math.floor(Math.random()*extra.length)] : petalEmoji;
      p.style.cssText += ';position:fixed;pointer-events:none;font-size:18px;animation:petalFly var(--pd) ease-out forwards;z-index:300;';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 1500);
    }, i*60);
  }
}

function spawnParticle(emoji) {
  const el=document.createElement('div');
  el.className='particle'; el.textContent=emoji;
  const rw=document.querySelector('.ring-wrap').getBoundingClientRect();
  el.style.left=(rw.left+rw.width/2+(Math.random()-.5)*80)+'px';
  el.style.top=(rw.top+rw.height/2+(Math.random()-.5)*60)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1900);
}

// ─────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────
function todayStr(){ return dateStr(new Date()); }
function dateStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function save(){ localStorage.setItem('fg_garden2',JSON.stringify(garden)); }

async function saveToSupabase(entry) {
  if (!currentUser) return;
  await sb.from('garden').insert({
    user_id: currentUser.id,
    tree: entry.tree,
    emoji: entry.emoji,
    name: entry.name,
    mins: entry.mins,
    date: entry.date,
    dead: entry.dead
  });
}

async function loadFromSupabase() {
  if (!currentUser) return;
  const { data, error } = await sb.from('garden').select('*').order('created_at');
  if (!error && data) {
    garden = data.map(r => ({
      tree: r.tree, emoji: r.emoji, name: r.name,
      mins: r.mins, date: r.date, dead: r.dead
    }));
    save();
  }
}

// ─────────────────────────────────────────
// WAKE LOCK  &  NOTIFICATIONS
// ─────────────────────────────────────────
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch(e) { /* silently ignore if denied */ }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// Re-acquire wake lock if page becomes visible again (iOS releases it on hide)
document.addEventListener('visibilitychange', () => {
  if (!isRunning) return;
  if (document.visibilityState === 'visible') {
    requestWakeLock();
    // Check if timer already expired while hidden
    const elapsed = Math.floor((Date.now() - startTimestamp) / 1000);
    if (elapsed >= totalTime) {
      clearInterval(timerId);
      finishFocus();
    }
  }
});



// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
async function initApp(session) {
  if (!session) {
    document.getElementById('authScreen').style.display = 'flex';
    return;
  }
  currentUser = session.user;
  document.getElementById('authScreen').style.display = 'none';
  await loadFromSupabase();
  // migrate local data if any
  const local = JSON.parse(localStorage.getItem('fg_garden2') || '[]');
  if (local.length > 0 && garden.length === 0) {
    for (const entry of local) { await saveToSupabase(entry); }
    await loadFromSupabase();
    localStorage.removeItem('fg_garden2');
  }
  garden = garden.map(e => {
    if (!e.name || !e.emoji) {
      const tDef = TREES.find(x => x.id === e.tree);
      if (tDef) { e.name = e.name || tDef.name; e.emoji = e.emoji || tDef.emoji; }
    }
    return e;
  });
  buildPicker();
  setEmojiStage(0, false);
  updateDisplay();
  renderGarden();
  renderStats();
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN') initApp(session);
  if (event === 'SIGNED_OUT') {
    currentUser = null;
    garden = [];
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('authEmail').value = '';
    document.getElementById('authPassword').value = '';
    document.getElementById('authMsg').textContent = '';
  }
});

// 頁面載入時檢查是否已登入
sb.auth.getSession().then(({ data: { session } }) => {
  initApp(session);
});

buildPicker();

// Drag-to-scroll picker
(function(){
  const wrap = document.getElementById('pickerScrollWrap');
  let isDown=false, startX, scrollLeft;
  wrap.addEventListener('mousedown', e=>{isDown=true;startX=e.pageX-wrap.offsetLeft;scrollLeft=wrap.scrollLeft;});
  wrap.addEventListener('mouseleave',()=>isDown=false);
  wrap.addEventListener('mouseup',  ()=>isDown=false);
  wrap.addEventListener('mousemove', e=>{if(!isDown)return;e.preventDefault();const x=e.pageX-wrap.offsetLeft;wrap.scrollLeft=scrollLeft-(x-startX);});
})();
setEmojiStage(0, false);
updateDisplay();
</script>
